ted Effort |\n|-------------|----------|----------|-----------------|\n| Lynis hardening index | node_exporter textfile collector | HIGH | 2h |\n| OpenSCAP CIS L1 scores | node_exporter textfile collector | HIGH | 2h |\n| WireGuard peer health | prometheus-wireguard-exporter DaemonSet | MEDIUM | 4h |\n| Harbor CVE counts | harbor-vulnerabilities-exporter | MEDIUM | 8h |\n| ClickUp manual control status | Infinity plugin + n8n middleware | LOW | 16h |",
