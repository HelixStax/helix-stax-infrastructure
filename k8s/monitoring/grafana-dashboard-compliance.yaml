apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-compliance
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Platform"
data:
  compliance-dashboard.json: |
    {
      "id": null,
      "uid": "helix-compliance-posture",
      "title": "Helix Stax — Compliance Posture",
      "description": "UCM control evidence dashboard mapping NIST CSF, SOC 2, ISO 27001, and CIS v8 controls to live infrastructure metrics. ~63% of controls are automated; remaining are tracked via ClickUp.",
      "tags": ["compliance", "security", "nist", "soc2", "iso27001", "cis"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "5m",
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "timepicker": {},
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "panels": [

        {
          "id": 1,
          "type": "row",
          "title": "Executive Summary",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 }
        },

        {
          "id": 2,
          "type": "stat",
          "title": "Overall Compliance Score",
          "description": "Percentage of automated controls currently passing. Excludes manual/ClickUp-only controls.",
          "gridPos": { "h": 6, "w": 4, "x": 0, "y": 1 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "green", "value": 85 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "(\n  (sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"}) / count(kube_node_info) * 100) +\n  (100 - clamp_max(sum(rate(apiserver_request_total{code=\"403\"}[5m])) * 100, 100)) +\n  (100 - clamp_max(increase(velero_backup_failure_total[24h] or vector(0)) * 10, 100)) +\n  clamp_max((1 - (time() - max(cnpg_collector_last_available_backup_timestamp or vector(time()))) / 86400) * 100, 100) +\n  (100 - clamp_max(sum(rate(traefik_service_requests_total{code=~\"5..\"}[5m])) / (sum(rate(traefik_service_requests_total[5m])) > 0) * 100, 100))\n) / 5",
              "legendFormat": "Score",
              "instant": true,
              "refId": "A"
            }
          ]
        },

        {
          "id": 3,
          "type": "gauge",
          "title": "NIST CSF 2.0",
          "description": "Automated NIST CSF control checks passing. PR.AC (access), PR.DS (encryption), DE.AE (detection), RC.RP (recovery), PR.IP (hardening).",
          "gridPos": { "h": 6, "w": 5, "x": 4, "y": 1 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 65 },
                  { "color": "green", "value": 80 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "(\n  clamp_max(count(kube_node_status_condition{condition=\"Ready\",status=\"true\"}) / count(kube_node_info) * 100, 100) +\n  clamp_max(100 - (sum(rate(apiserver_request_total{code=\"403\"}[5m])) / (sum(rate(apiserver_request_total[5m])) > 0) * 100), 100) +\n  clamp_max((min((traefik_tls_certs_not_after - time()) / 86400) > 30) * 100 or vector(0), 100) +\n  clamp_max((count(node_selinux_current_mode == 1) / count(node_selinux_current_mode) * 100) or vector(50), 100)\n) / 4",
              "legendFormat": "NIST CSF",
              "instant": true,
              "refId": "A"
            }
          ]
        },

        {
          "id": 4,
          "type": "gauge",
          "title": "SOC 2 (CC + A)",
          "description": "SOC 2 common criteria: CC6 (access), CC7 (detection/monitoring), CC8 (change management), A1 (availability). Automated coverage only.",
          "gridPos": { "h": 6, "w": 5, "x": 9, "y": 1 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 65 },
                  { "color": "green", "value": 80 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "(\n  clamp_max(count(kube_node_status_condition{condition=\"Ready\",status=\"true\"}) / count(kube_node_info) * 100, 100) +\n  clamp_max((rate(argocd_app_sync_total{phase=\"Succeeded\"}[7d]) or vector(1)) / (rate(argocd_app_sync_total[7d]) or vector(1)) * 100, 100) +\n  clamp_max(100 - (count(argocd_app_info{health_status=\"Degraded\"} or vector(0)) * 20), 100) +\n  clamp_max(100 - (sum(rate(traefik_service_requests_total{code=~\"5..\"}[5m])) / (sum(rate(traefik_service_requests_total[5m])) > 0) * 100), 100)\n) / 4",
              "legendFormat": "SOC 2",
              "instant": true,
              "refId": "A"
            }
          ]
        },

        {
          "id": 5,
          "type": "gauge",
          "title": "ISO 27001:2022",
          "description": "ISO 27001 Annex A automated checks: A.9 (access), A.10 (encryption), A.12 (ops security), A.12.3 (backup), A.17 (availability).",
          "gridPos": { "h": 6, "w": 5, "x": 14, "y": 1 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 65 },
                  { "color": "green", "value": 80 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "(\n  clamp_max((min((traefik_tls_certs_not_after - time()) / 86400) > 30) * 100 or vector(0), 100) +\n  clamp_max((time() - max(cnpg_collector_last_available_backup_timestamp or vector(time() - 3600))) < 86400, 100) * 100 +\n  clamp_max(count(kube_node_status_condition{condition=\"Ready\",status=\"true\"}) / count(kube_node_info) * 100, 100) +\n  clamp_max(100 - (sum(rate(apiserver_request_total{code=\"403\"}[5m])) / (sum(rate(apiserver_request_total[5m])) > 0) * 50), 100)\n) / 4",
              "legendFormat": "ISO 27001",
              "instant": true,
              "refId": "A"
            }
          ]
        },

        {
          "id": 6,
          "type": "gauge",
          "title": "CIS v8 IG2",
          "description": "CIS Controls v8 Implementation Group 2: #1 asset inventory (nodes), #7 vuln mgmt (CrowdSec), #13 network monitoring (Traefik), #16 account mgmt (RBAC/403s).",
          "gridPos": { "h": 6, "w": 5, "x": 19, "y": 1 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 65 },
                  { "color": "green", "value": 80 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "(\n  clamp_max(count(kube_node_info) > 0, 1) * 100 +\n  clamp_max((sum(cs_lapi_decisions_ok_total or vector(0)) > 0) * 100 or vector(50), 100) +\n  clamp_max(100 - (sum(rate(traefik_service_requests_total{code=~\"4..\"}[5m])) / (sum(rate(traefik_service_requests_total[5m])) > 0) * 100), 100) +\n  clamp_max(100 - (sum(rate(apiserver_request_total{code=\"403\"}[1h])) > 10) * 30, 100)\n) / 4",
              "legendFormat": "CIS v8",
              "instant": true,
              "refId": "A"
            }
          ]
        },

        {
          "id": 10,
          "type": "row",
          "title": "Access Control (NIST PR.AC | SOC 2 CC6 | ISO A.9)",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 7 }
        },

        {
          "id": 11,
          "type": "stat",
          "title": "K8s RBAC — 403 Forbidden (1h)",
          "description": "Unauthorized Kubernetes API requests in the last hour. These indicate RBAC enforcement is working OR a service is misconfigured. GREEN = low volume (< 10), RED = high volume (> 100). Control: NIST PR.AC-4, SOC 2 CC6.3.",
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 8 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 10 },
                  { "color": "red", "value": 100 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(increase(apiserver_request_total{code=\"403\"}[1h]))",
              "legendFormat": "403 Forbidden",
              "instant": true,
              "refId": "A"
            }
          ]
        },

        {
          "id": 12,
          "type": "stat",
          "title": "K8s Unauthenticated (401) — 1h",
          "description": "Unauthenticated API calls in the last hour. Should be near-zero in a hardened cluster. Control: NIST PR.AC-1, ISO A.9.4.",
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 8 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 50 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(increase(apiserver_request_total{code=\"401\"}[1h]))",
              "legendFormat": "401 Unauthorized",
              "instant": true,
              "refId": "A"
            }
          ]
        },

        {
          "id": 13,
          "type": "stat",
          "title": "Zitadel — HTTP Request Rate",
          "description": "Zitadel identity provider request rate. Confirms the IdP is receiving traffic. A drop to zero may indicate SSO is unavailable. Control: NIST PR.AC-1, SOC 2 CC6.1.",
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 8 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "yellow", "value": null },
                  { "color": "green", "value": 0.01 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(http_server_request_count_total{job=~\".*zitadel.*\"}[5m]))",
              "legendFormat": "Zitadel req/s",
              "instant": true,
              "refId": "A"
            }
          ]
        },

        {
          "id": 14,
          "type": "stat",
          "title": "Zitadel — Auth Error Rate",
          "description": "Percentage of Zitadel HTTP responses that are 4xx or 5xx. Elevated error rate may indicate authentication failures or configuration issues. Control: NIST PR.AC-1, SOC 2 CC6.1.",
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 8 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(http_server_return_code_counter_total{job=~\".*zitadel.*\",code=~\"4..|5..\"}[5m])) / (sum(rate(http_server_return_code_counter_total{job=~\".*zitadel.*\"}[5m])) > 0) * 100",
              "legendFormat": "Error %",
              "instant": true,
              "refId": "A"
            }
          ]
        },

        {
          "id": 15,
          "type": "timeseries",
          "title": "K8s API Auth Failures Over Time",
          "description": "Trend of 401 and 403 responses to the Kubernetes API server. Spikes may indicate brute-force or misconfigured service accounts. Control: NIST PR.AC-4, SOC 2 CC6.3, ISO A.9.4.",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 8 },
          "options": {
            "tooltip": { "mode": "multi", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "403 Forbidden" },
                "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }]
              },
              {
                "matcher": { "id": "byName", "options": "401 Unauthorized" },
                "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }]
              }
            ]
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(apiserver_request_total{code=\"403\"}[5m])) * 60",
              "legendFormat": "403 Forbidden",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(apiserver_request_total{code=\"401\"}[5m])) * 60",
              "legendFormat": "401 Unauthorized",
              "refId": "B"
            }
          ]
        },

        {
          "id": 16,
          "type": "timeseries",
          "title": "Zitadel Request Latency (p50 / p95 / p99)",
          "description": "Zitadel authentication latency percentiles. High p99 may indicate database contention or resource pressure affecting user login experience. Control: SOC 2 CC6.1, ISO A.9.",
          "gridPos": { "h": 4, "w": 16, "x": 0, "y": 12 },
          "options": {
            "tooltip": { "mode": "multi", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "lineWidth": 2, "fillOpacity": 5 }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.50, sum by (le) (rate(http_server_request_duration_seconds_bucket{job=~\".*zitadel.*\"}[5m])))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.95, sum by (le) (rate(http_server_request_duration_seconds_bucket{job=~\".*zitadel.*\"}[5m])))",
              "legendFormat": "p95",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99, sum by (le) (rate(http_server_request_duration_seconds_bucket{job=~\".*zitadel.*\"}[5m])))",
              "legendFormat": "p99",
              "refId": "C"
            }
          ]
        },

        {
          "id": 20,
          "type": "row",
          "title": "Audit & Logging (NIST DE.AE | SOC 2 CC7 | ISO A.12.4)",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 16 }
        },

        {
          "id": 21,
          "type": "stat",
          "title": "Loki — Ingestion Healthy",
          "description": "Loki WAL records being logged — confirms log ingestion pipeline is operational. Value = 1 means scrape target is up. Control: NIST DE.AE-3, SOC 2 CC7.2, ISO A.12.4.",
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 17 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "value_and_name",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "1": { "text": "HEALTHY", "color": "green", "index": 0 } } },
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red", "index": 1 } } }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "up{job=~\".*loki.*\"}",
              "legendFormat": "Loki Up",
              "instant": true,
              "refId": "A"
            }
          ]
        },

        {
          "id": 22,
          "type": "stat",
          "title": "Prometheus Rule Eval Failures",
          "description": "Prometheus alerting/recording rule evaluation failures. Non-zero indicates alert rules are broken and may not fire when needed. Control: NIST DE.AE-2, SOC 2 CC7.2.",
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 17 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(prometheus_rule_evaluation_failures_total)",
              "legendFormat": "Failures",
              "instant": true,
              "refId": "A"
            }
          ]
        },

        {
          "id": 23,
          "type": "timeseries",
          "title": "Log Volume by Namespace (per minute)",
          "description": "Log ingestion rate per namespace. Sustained zero volume for a namespace means logs have stopped flowing — potential evidence gap. Control: NIST DE.AE-3, SOC 2 CC7.2, ISO A.12.4.",
          "gridPos": { "h": 8, "w": 16, "x": 8, "y": 17 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "tooltip": { "mode": "multi", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 1, "fillOpacity": 20 }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "sum by (namespace) (rate({namespace=~\".+\"}[5m]))",
              "legendFormat": "{{namespace}}",
              "refId": "A"
            }
          ]
        },

        {
          "id": 24,
          "type": "stat",
          "title": "Prometheus Scrape Targets — Up",
          "description": "Total number of Prometheus scrape targets currently UP. A drop indicates a service stopped exposing metrics — compliance evidence gap. Control: NIST DE.AE-3.",
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 21 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "center"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "green", "value": 10 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "count(up == 1)",
              "legendFormat": "Targets Up",
              "instant": true,
              "refId": "A"
            }
          ]
        },

        {
          "id": 25,
          "type": "text",
          "title": "Log Retention Status",
