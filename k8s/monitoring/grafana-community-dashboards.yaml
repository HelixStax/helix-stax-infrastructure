#     Reason: Redundant — CloudNativePG dashboard (20417) covers PostgreSQL monitoring.
#             Dashboard was RED (conflicting/broken panels). CNPG dashboard is the correct one.
#   - monitoring-kube-prometheus-nodes-aix    (kube-prometheus-stack built-in)
