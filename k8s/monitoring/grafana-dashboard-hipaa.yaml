                "content": "## HIPAA Security Rule NPRM 2024 — Proposed Requirements\n\nThe 2024 Proposed Rule (published December 27, 2024) eliminates the \"required vs. addressable\" distinction and adds specific new technical mandates. The final rule is TBD but organizations should begin gap remediation.\n\n| New Requirement | Proposed Section | Current Status | Evidence / Action |\n|---|---|---|---|\n| **MFA without exception** | §164.312(d) | YELLOW — Zitadel MFA configured; verify all service accounts | Zitadel admin: Login Policy > Force MFA |\n| **72-hour restoration capability** | §164.308(a)(7)(ii)(B) | YELLOW — Velero planned; restoration not yet tested | Deploy Velero + test restore to staging |\n| **Bi-annual vulnerability scanning** | §164.308(a)(8) | YELLOW — No automated scanner; CrowdSec provides IDS only | Add Trivy or Grype to CI pipeline; schedule bi-annual report |\n| **24-hour breach notification** | §164.308(a)(6)(ii) | GREY — Policy needed | Create incident response SOP in ClickUp > Process Library |\n| **Annual backup testing** | §164.308(a)(7)(ii)(D) | GREY — Not yet scheduled | Create recurring ClickUp task: annual Velero restore test |\n| **Technology asset inventory** | §164.308(a)(1) | YELLOW — K3s nodes documented; apps partial | Complete asset inventory in ClickUp > Compliance Program |\n| **Eliminate addressable controls** | All 164.308/164.310 | GREY — All controls now required | Update risk register: all previously addressable = required |\n\n**Overall NPRM 2024 Readiness**: 3/7 items in progress (YELLOW). 4/7 require policy or process creation (GREY). No items fully PASS (GREEN) yet.\n\n_Note: NPRM is a proposed rule — not yet final law. Monitor HHS OCR for final rule publication. Implement as risk management priority regardless of final rule timeline._",
                "mode": "markdown"
              },
