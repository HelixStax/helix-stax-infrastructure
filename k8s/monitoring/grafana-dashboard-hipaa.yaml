---
# HIPAA Security Rule Compliance Dashboard — Helix Stax
#
# Grafana dashboard provisioned via ConfigMap using kube-prometheus-stack
# k8s-sidecar. Label grafana_dashboard=1 causes automatic pickup.
# Annotation grafana_folder=Compliance routes to the Compliance folder.
#
# Dashboard structure (6 rows):
#   Row 1: Executive Compliance Summary
#   Row 2: Technical Safeguards §164.312 — Access Control & Encryption
#   Row 3: Administrative Safeguards §164.308 — Security Incidents & Backup
#   Row 4: Physical Safeguards §164.310 — Delegated to Hetzner
#   Row 5: Backup & Recovery §164.308(a)(7)
#   Row 6: HIPAA NPRM 2024 Readiness
#
# Metrics dependencies:
#   - kube-prometheus-stack (kube-state-metrics, node-exporter, Prometheus) — deployed
#   - Loki — deployed
#   - Zitadel ServiceMonitor — needed for http_server_* metrics
#   - CrowdSec with prometheus enabled — needed for cs_* metrics
#   - CloudNativePG PodMonitor — needed for cnpg_collector_* metrics
#   - Velero (planned) — backup panels show N/A until deployed
#   - hipaa-recording-rules.yaml — must be applied first for score panels
#
# Applying:
#   kubectl apply -f k8s/monitoring/hipaa-recording-rules.yaml
#   kubectl apply -f k8s/monitoring/grafana-dashboard-hipaa.yaml
#
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-hipaa
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Compliance"
data:
  hipaa-dashboard.json: |
    {
      "__inputs": [],
      "__requires": [
        {
          "type": "grafana",
          "id": "grafana",
          "name": "Grafana",
          "version": "10.0.0"
        },
        {
          "type": "datasource",
          "id": "prometheus",
          "name": "Prometheus",
          "version": "1.0.0"
        },
        {
          "type": "datasource",
          "id": "loki",
          "name": "Loki",
          "version": "1.0.0"
        }
      ],
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": { "type": "grafana", "uid": "-- Grafana --" },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "HIPAA Security Rule (45 CFR 164) compliance posture — maps Technical, Administrative, and Physical safeguards to live metrics. Intended for compliance officers and auditors. Last updated: 2026-03-25.",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [

        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "title": "Row 1: Executive Compliance Summary",
          "type": "row"
        },

        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 60 },
                  { "color": "green", "value": 80 }
                ]
              },
              "unit": "percent",
              "min": 0,
              "max": 100
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 1 },
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "title": "HIPAA Technical Score",
          "description": "Percentage of automated Technical Safeguard controls currently passing. Based on hipaa_control_passing recording rules.",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "hipaa_technical_score",
              "legendFormat": "Technical Score",
              "refId": "A"
            }
          ]
        },

        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [
                { "options": { "0": { "color": "red", "index": 0, "text": "FAIL" }, "1": { "color": "green", "index": 1, "text": "PASS" } }, "type": "value" }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 3, "x": 4, "y": 1 },
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "title": "§164.312(e)(1) Transmission Security",
          "description": "WireGuard flannel-wg tunnel up on all nodes.",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "hipaa_control_passing{control=\"wireguard_tunnels_up\"}",
              "legendFormat": "WireGuard",
              "refId": "A"
            }
          ]
        },

        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [
                { "options": { "0": { "color": "red", "index": 0, "text": "FAIL" }, "1": { "color": "green", "index": 1, "text": "PASS" } }, "type": "value" }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 3, "x": 7, "y": 1 },
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "title": "§164.312(d) Auth / MFA",
          "description": "Zitadel identity provider running. MFA policy enforced — verify in Zitadel admin console.",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "hipaa_control_passing{control=\"identity_provider_healthy\"}",
              "legendFormat": "IdP",
              "refId": "A"
            }
          ]
        },

        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [
                { "options": { "0": { "color": "red", "index": 0, "text": "FAIL" }, "1": { "color": "green", "index": 1, "text": "PASS" } }, "type": "value" }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 3, "x": 10, "y": 1 },
          "id": 5,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "title": "§164.312(b) Audit Logging",
          "description": "Loki log collection active and monitoring namespace healthy.",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "hipaa_control_passing{control=\"audit_logging_active\"}",
              "legendFormat": "Audit Logs",
              "refId": "A"
            }
          ]
        },

        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [
                { "options": { "0": { "color": "red", "index": 0, "text": "FAIL" }, "1": { "color": "green", "index": 1, "text": "PASS" } }, "type": "value" }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 3, "x": 13, "y": 1 },
          "id": 6,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "title": "§164.308(a)(7) Backup",
          "description": "CNPG backup within 25h RPO window. Velero panels below show full backup status.",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "hipaa_control_passing{control=\"cnpg_backup_recent\"}",
              "legendFormat": "Backup RPO",
              "refId": "A"
            }
          ]
        },

        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [
                { "options": { "0": { "color": "red", "index": 0, "text": "FAIL" }, "1": { "color": "green", "index": 1, "text": "PASS" } }, "type": "value" }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 3, "x": 16, "y": 1 },
          "id": 7,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "title": "§164.308(a)(6) IDS Active",
          "description": "CrowdSec intrusion detection system running and processing events.",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "hipaa_control_passing{control=\"crowdsec_ids_active\"}",
              "legendFormat": "IDS",
              "refId": "A"
            }
          ]
        },

        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0 }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 4, "x": 19, "y": 1 },
          "id": 8,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "value_and_name"
          },
          "title": "Controls Passing / Total",
          "description": "Count of automated technical controls currently in PASS state versus total defined controls.",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "hipaa_technical_controls_passing",
              "legendFormat": "Passing",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "hipaa_technical_controls_total",
              "legendFormat": "Total",
              "refId": "B"
            }
          ]
        },

        {
          "collapsed": true,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "id": 10,
          "title": "Row 2: Technical Safeguards §164.312 — Access Control & Encryption",
          "type": "row",
          "panels": [

            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "fieldConfig": {
                "defaults": {
                  "color": { "mode": "thresholds" },
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      { "color": "red", "value": null },
                      { "color": "green", "value": 1 }
                    ]
                  },
                  "unit": "short",
                  "mappings": [
                    { "options": { "0": { "color": "red", "index": 0, "text": "DOWN" }, "1": { "color": "green", "index": 1, "text": "UP" } }, "type": "value" }
                  ]
                },
                "overrides": []
              },
              "gridPos": { "h": 3, "w": 4, "x": 0, "y": 6 },
              "id": 11,
              "options": {
                "colorMode": "background",
                "graphMode": "none",
                "justifyMode": "center",
                "orientation": "auto",
                "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
                "textMode": "auto"
              },
              "title": "§164.312(e)(1) WireGuard Tunnel Status",
              "description": "flannel-wg interface up on all K3s nodes. Provides encrypted CNI traffic (WireGuard backend).",
              "type": "stat",
              "targets": [
                {
                  "datasource": { "type": "prometheus", "uid": "${datasource}" },
                  "expr": "node_network_up{device=\"flannel-wg\"}",
                  "legendFormat": "{{instance}}",
                  "refId": "A"
                }
              ]
            },

            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "fieldConfig": {
                "defaults": {
                  "color": { "mode": "thresholds" },
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      { "color": "red", "value": null },
                      { "color": "yellow", "value": 2592000 },
                      { "color": "green", "value": 7776000 }
                    ]
                  },
                  "unit": "s"
                },
                "overrides": []
              },
              "gridPos": { "h": 3, "w": 4, "x": 4, "y": 6 },
              "id": 12,
              "options": {
                "colorMode": "background",
                "graphMode": "none",
                "justifyMode": "center",
                "orientation": "auto",
                "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
                "textMode": "auto"
              },
              "title": "§164.312(e)(2)(ii) TLS Cert Expiry — Remaining",
              "description": "Time remaining on TLS certificates. Yellow <30d, Red <7d. Cloudflare Origin CA 15-year certs expected. Query requires Blackbox Exporter (not yet deployed — panel shows N/A until deployed).",
              "type": "stat",
              "targets": [
                {
                  "datasource": { "type": "prometheus", "uid": "${datasource}" },
                  "expr": "probe_ssl_earliest_cert_expiry{job=\"blackbox\"} - time()",
                  "legendFormat": "{{instance}}",
                  "refId": "A"
                }
              ]
            },

            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "fieldConfig": {
                "defaults": {
                  "color": { "mode": "thresholds" },
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      { "color": "red", "value": null },
                      { "color": "green", "value": 1 }
                    ]
                  },
                  "unit": "short",
                  "mappings": [
                    { "options": { "0": { "color": "red", "index": 0, "text": "DOWN" }, "1": { "color": "green", "index": 1, "text": "HEALTHY" } }, "type": "value" }
                  ]
                },
                "overrides": []
              },
              "gridPos": { "h": 3, "w": 4, "x": 8, "y": 6 },
              "id": 13,
              "options": {
                "colorMode": "background",
                "graphMode": "none",
                "justifyMode": "center",
                "orientation": "auto",
                "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
                "textMode": "auto"
              },
              "title": "§164.312(a)(2)(iv) DB SSL — CNPG",
              "description": "CloudNativePG cluster running. SSL is enforced by default in all CNPG clusters (sslmode=verify-full). §164.312(a)(2)(iv) encryption/decryption safeguard.",
              "type": "stat",
              "targets": [
                {
                  "datasource": { "type": "prometheus", "uid": "${datasource}" },
                  "expr": "hipaa_control_passing{control=\"database_ssl_enabled\"}",
                  "legendFormat": "DB SSL",
                  "refId": "A"
                }
              ]
            },

            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "fieldConfig": {
                "defaults": {
                  "color": { "mode": "thresholds" },
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      { "color": "red", "value": null },
                      { "color": "green", "value": 1 }
                    ]
                  },
                  "unit": "short",
                  "mappings": [
                    { "options": { "0": { "color": "red", "index": 0, "text": "DOWN" }, "1": { "color": "green", "index": 1, "text": "HEALTHY" } }, "type": "value" }
                  ]
                },
                "overrides": []
              },
              "gridPos": { "h": 3, "w": 4, "x": 12, "y": 6 },
              "id": 14,
              "options": {
                "colorMode": "background",
                "graphMode": "none",
                "justifyMode": "center",
                "orientation": "auto",
                "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
                "textMode": "auto"
              },
              "title": "§164.312(d) Zitadel IdP Health",
              "description": "Zitadel OIDC provider running. MFA enforcement must be verified manually: Zitadel admin console > Organization > Policies > Login Policy > Require MFA. §164.312(d) Person/Entity Authentication.",
              "type": "stat",
              "targets": [
                {
                  "datasource": { "type": "prometheus", "uid": "${datasource}" },
                  "expr": "hipaa_control_passing{control=\"identity_provider_healthy\"}",
                  "legendFormat": "Zitadel",
                  "refId": "A"
                }
              ]
            },

            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "fieldConfig": {
                "defaults": {
                  "color": { "mode": "palette-classic" },
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      { "color": "green", "value": null },
                      { "color": "yellow", "value": 10 },
                      { "color": "red", "value": 50 }
                    ]
                  },
                  "unit": "short"
                },
                "overrides": []
              },
              "gridPos": { "h": 3, "w": 4, "x": 16, "y": 6 },
              "id": 15,
              "options": {
                "colorMode": "background",
                "graphMode": "area",
                "justifyMode": "auto",
                "orientation": "auto",
                "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
                "textMode": "auto"
              },
              "title": "§164.312(a)(1) Zitadel HTTP Errors (5m rate)",
              "description": "HTTP 5xx error rate from Zitadel. High error rate may indicate auth service issues. Metric: http_server_return_code_counter_total (Zitadel ServiceMonitor required). §164.312(a)(1) Access Control.",
              "type": "stat",
              "targets": [
                {
                  "datasource": { "type": "prometheus", "uid": "${datasource}" },
                  "expr": "sum(rate(http_server_return_code_counter_total{namespace=\"identity\",code=~\"5..\"}[5m])) or vector(0)",
                  "legendFormat": "5xx/s",
                  "refId": "A"
                }
              ]
            },

            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "fieldConfig": {
                "defaults": {
                  "color": { "mode": "thresholds" },
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      { "color": "green", "value": null },
                      { "color": "yellow", "value": 5 },
                      { "color": "red", "value": 20 }
                    ]
                  },
                  "unit": "short"
                },
                "overrides": []
              },
              "gridPos": { "h": 3, "w": 4, "x": 20, "y": 6 },
              "id": 16,
              "options": {
                "colorMode": "background",
                "graphMode": "area",
                "justifyMode": "auto",
                "orientation": "auto",
                "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
                "textMode": "auto"
              },
              "title": "§164.312(a)(1) Traefik 401/403 Rate (1h)",
              "description": "Count of 401 Unauthorized and 403 Forbidden responses from Traefik in the last hour. Elevated counts indicate unauthorized access attempts. §164.312(a)(1) Access Control.",
              "type": "stat",
              "targets": [
                {
                  "datasource": { "type": "prometheus", "uid": "${datasource}" },
                  "expr": "sum(increase(traefik_entrypoint_requests_total{code=~\"401|403\"}[1h])) or vector(0)",
                  "legendFormat": "Auth Failures",
                  "refId": "A"
                }
              ]
            },

            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "fieldConfig": {
                "defaults": {
                  "color": { "mode": "palette-classic" },
                  "custom": {
                    "axisCenteredZero": false,
                    "axisColorMode": "text",
                    "axisLabel": "",
                    "axisPlacement": "auto",
                    "barAlignment": 0,
                    "drawStyle": "line",
                    "fillOpacity": 15,
                    "gradientMode": "none",
                    "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                    "insertNulls": false,
                    "lineInterpolation": "smooth",
                    "lineWidth": 2,
                    "pointSize": 4,
                    "scaleDistribution": { "type": "linear" },
                    "showPoints": "never",
                    "spanNulls": true,
                    "stacking": { "group": "A", "mode": "none" },
                    "thresholdsStyle": { "mode": "off" }
                  },
                  "unit": "reqps"
                },
                "overrides": []
              },
              "gridPos": { "h": 6, "w": 12, "x": 0, "y": 9 },
              "id": 17,
              "options": {
                "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true },
                "tooltip": { "mode": "multi", "sort": "desc" }
              },
              "title": "§164.312(a) Zitadel Auth Request Rate — 200 vs 4xx vs 5xx",
              "description": "Zitadel HTTP request rate split by status code family. Spikes in 4xx indicate failed authentications. Requires Zitadel ServiceMonitor on :8080/debug/metrics.",
              "type": "timeseries",
              "targets": [
                {
                  "datasource": { "type": "prometheus", "uid": "${datasource}" },
                  "expr": "sum(rate(http_server_request_count_total{namespace=\"identity\",code=~\"2..\"}[5m])) or vector(0)",
                  "legendFormat": "2xx (success)",
                  "refId": "A"
                },
                {
                  "datasource": { "type": "prometheus", "uid": "${datasource}" },
                  "expr": "sum(rate(http_server_request_count_total{namespace=\"identity\",code=~\"4..\"}[5m])) or vector(0)",
                  "legendFormat": "4xx (client error / auth failure)",
                  "refId": "B"
                },
                {
                  "datasource": { "type": "prometheus", "uid": "${datasource}" },
                  "expr": "sum(rate(http_server_request_count_total{namespace=\"identity\",code=~\"5..\"}[5m])) or vector(0)",
                  "legendFormat": "5xx (server error)",
                  "refId": "C"
