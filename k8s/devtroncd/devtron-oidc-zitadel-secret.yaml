# devtron-oidc-zitadel — Zitadel OIDC client credentials for Devtron SSO
# Namespace: devtroncd
#
# IMPORTANT: Do NOT apply this file directly — it is a template.
# Values are PLACEHOLDER only. Actual credentials must be created via:
#   scripts/devtron-setup-oidc.sh create-oidc-client
#
# To create the secret manually with real values:
#   kubectl create secret generic devtron-oidc-zitadel \
#     -n devtroncd \
#     --from-literal=client-id="<ZITADEL_CLIENT_ID>" \
#     --from-literal=client-secret="<ZITADEL_CLIENT_SECRET>"
#
# This secret is read by devtron-setup-oidc.sh to patch devtron-secret.DEX_CONFIG.
# It is NOT mounted directly into any pod.
apiVersion: v1
kind: Secret
metadata:
  name: devtron-oidc-zitadel
  namespace: devtroncd
  labels:
    app.kubernetes.io/part-of: devtron
    app.kubernetes.io/component: sso
  annotations:
    # Remind operators this contains sensitive credentials
    description: "Zitadel OIDC client credentials for Devtron SSO via Dex"
type: Opaque
stringData:
  # REPLACE with actual values from Zitadel after running create-oidc-client step
  client-id: "PLACEHOLDER_DO_NOT_APPLY"
  client-secret: "PLACEHOLDER_DO_NOT_APPLY"
