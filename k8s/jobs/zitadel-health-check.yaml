---
# zitadel-health-check CronJob
# Daily health verification for Zitadel identity service.
#
# Checks:
#   1. HTTP health endpoint: /healthz returns 200
#   2. OIDC discovery: /.well-known/openid-configuration returns valid JSON
#   3. Zitadel pod(s) in identity namespace are Running and Ready
#
# Schedule: 0 8 * * * (daily at 08:00 UTC)
#
# Results logged to stdout — visible via:
#   kubectl logs -n identity -l app.kubernetes.io/name=zitadel-health-check
#
apiVersion: v1
kind: ServiceAccount
metadata:
  name: zitadel-health-check-sa
  namespace: identity
  labels:
    app.kubernetes.io/component: ops-job
    app.kubernetes.io/part-of: helix-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: zitadel-health-check-role
  namespace: identity
  labels:
    app.kubernetes.io/component: ops-job
    app.kubernetes.io/part-of: helix-platform
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: zitadel-health-check-rb
  namespace: identity
  labels:
    app.kubernetes.io/component: ops-job
    app.kubernetes.io/part-of: helix-platform
subjects:
  - kind: ServiceAccount
    name: zitadel-health-check-sa
    namespace: identity
roleRef:
  kind: Role
  name: zitadel-health-check-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: zitadel-health-check
  namespace: identity
  labels:
    app.kubernetes.io/name: zitadel-health-check
    app.kubernetes.io/component: ops-job
    app.kubernetes.io/part-of: helix-platform
spec:
  schedule: "0 8 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      activeDeadlineSeconds: 300
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: zitadel-health-check
            app.kubernetes.io/component: ops-job
            app.kubernetes.io/part-of: helix-platform
        spec:
          serviceAccountName: zitadel-health-check-sa
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          containers:
            - name: health-check
              image: bitnami/kubectl:1.32
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 50m
                  memory: 32Mi
                limits:
                  cpu: 200m
                  memory: 64Mi
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail

                  ZITADEL_URL="https://zitadel.helixstax.net"
                  NAMESPACE="identity"
                  ERRORS=0

                  echo "=== Zitadel Health Check ==="
                  echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
                  echo "URL: ${ZITADEL_URL}"
                  echo ""

                  # ── Check 1: HTTP health endpoint ─────────────────────────────
                  echo "-- Check 1: Health endpoint --"
                  HTTP_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
                    --max-time 10 "${ZITADEL_URL}/healthz" 2>/dev/null || echo "000")

                  if [ "$HTTP_STATUS" = "200" ]; then
                    echo "  PASS: /healthz returned HTTP ${HTTP_STATUS}"
                  else
                    echo "  FAIL: /healthz returned HTTP ${HTTP_STATUS} (expected 200)"
                    ERRORS=$((ERRORS + 1))
                  fi

                  # ── Check 2: OIDC discovery endpoint ──────────────────────────
                  echo ""
                  echo "-- Check 2: OIDC discovery endpoint --"
                  OIDC_RESPONSE=$(curl -sf --max-time 10 \
                    "${ZITADEL_URL}/.well-known/openid-configuration" 2>/dev/null || echo "")

                  if echo "$OIDC_RESPONSE" | grep -q '"issuer"'; then
                    ISSUER=$(echo "$OIDC_RESPONSE" | grep -o '"issuer":"[^"]*"' | cut -d'"' -f4)
                    echo "  PASS: OIDC discovery returned valid JSON"
                    echo "  Issuer: ${ISSUER}"
                  else
                    echo "  FAIL: /.well-known/openid-configuration did not return valid JSON"
                    echo "  Response (first 200 chars): ${OIDC_RESPONSE:0:200}"
                    ERRORS=$((ERRORS + 1))
                  fi

                  # ── Check 3: Pod health ───────────────────────────────────────
                  echo ""
                  echo "-- Check 3: Pod health in identity namespace --"
                  POD_INFO=$(kubectl get pods -n "$NAMESPACE" -l app.kubernetes.io/name=zitadel \
                    --no-headers 2>/dev/null || echo "")

                  if [ -z "$POD_INFO" ]; then
                    echo "  WARN: No Zitadel pods found with label app.kubernetes.io/name=zitadel"
                    # Try broader selector
                    POD_INFO=$(kubectl get pods -n "$NAMESPACE" --no-headers 2>/dev/null || echo "")
                    echo "  All pods in identity namespace:"
                    echo "$POD_INFO" | awk '{print "    " $0}'
                  else
                    TOTAL=$(echo "$POD_INFO" | wc -l | tr -d ' ')
                    RUNNING=$(echo "$POD_INFO" | grep -c "Running" || true)
                    NOT_RUNNING=$(echo "$POD_INFO" | grep -v "Running" | grep -v "^$" || true)

                    echo "  Pods found: ${TOTAL} total, ${RUNNING} Running"
                    echo "$POD_INFO" | awk '{print "    " $0}'

                    if [ -n "$NOT_RUNNING" ]; then
                      echo "  FAIL: Some pods are not Running:"
                      echo "$NOT_RUNNING" | awk '{print "    " $0}'
                      ERRORS=$((ERRORS + 1))
                    else
                      echo "  PASS: All pods Running"
                    fi
                  fi

                  # ── Summary ───────────────────────────────────────────────────
                  echo ""
                  echo "=== Summary ==="
                  if [ "$ERRORS" -eq 0 ]; then
                    echo "RESULT: HEALTHY (0 failures)"
                    exit 0
                  else
                    echo "RESULT: UNHEALTHY (${ERRORS} check(s) failed)"
                    exit 1
                  fi
