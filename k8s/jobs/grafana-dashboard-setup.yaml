---
# grafana-dashboard-setup Job
# Downloads community dashboards from grafana.com and creates ConfigMaps
# in the monitoring namespace so the Grafana sidecar can provision them.
#
# Use after cluster rebuilds or when dashboard ConfigMaps are lost.
# Grafana sidecar reloads dashboards within ~30 seconds of ConfigMap creation.
#
# Trigger:
#   kubectl create job --from=job/grafana-dashboard-setup grafana-dashboard-setup-$(date +%Y%m%d%H%M) -n monitoring
#
# Note: Requires internet access to grafana.com from within the cluster.
#
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana-dashboard-setup-sa
  namespace: monitoring
  labels:
    app.kubernetes.io/component: ops-job
    app.kubernetes.io/part-of: helix-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: grafana-dashboard-setup-role
  namespace: monitoring
  labels:
    app.kubernetes.io/component: ops-job
    app.kubernetes.io/part-of: helix-platform
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "delete", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grafana-dashboard-setup-rb
  namespace: monitoring
  labels:
    app.kubernetes.io/component: ops-job
    app.kubernetes.io/part-of: helix-platform
subjects:
  - kind: ServiceAccount
    name: grafana-dashboard-setup-sa
    namespace: monitoring
roleRef:
  kind: Role
  name: grafana-dashboard-setup-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: grafana-dashboard-setup
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana-dashboard-setup
    app.kubernetes.io/component: ops-job
    app.kubernetes.io/part-of: helix-platform
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana-dashboard-setup
        app.kubernetes.io/component: ops-job
        app.kubernetes.io/part-of: helix-platform
    spec:
      serviceAccountName: grafana-dashboard-setup-sa
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      volumes:
        - name: work
          emptyDir: {}
      containers:
        - name: setup
          # bitnami/kubectl includes curl and python3 for the download + kubectl for ConfigMap creation
          image: bitnami/kubectl:1.32
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          volumeMounts:
            - name: work
              mountPath: /tmp/dashboards
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              NAMESPACE="monitoring"
              WORK_DIR="/tmp/dashboards"
              mkdir -p "$WORK_DIR"

              echo "=== Grafana Dashboard Bootstrap ==="
              echo "Downloading community dashboards from grafana.com..."

              # Download a single dashboard JSON from grafana.com
              fetch_dashboard() {
                local gnet_id="$1"
                local filepath="$2"
                local url="https://grafana.com/api/dashboards/${gnet_id}/revisions/latest/download"
                if curl -sf -A "Mozilla/5.0" -o "$filepath" --max-time 30 "$url"; then
                  echo "  Downloaded ($(wc -c < "$filepath") bytes)"
                  return 0
                else
                  echo "  FAILED to download dashboard ${gnet_id}"
                  return 1
                fi
              }

              # Create ConfigMap from dashboard JSON file
              apply_dashboard_configmap() {
                local filepath="$1"
                local cm_name="$2"
                local folder="$3"
                local filename
                filename=$(basename "$filepath")

                # Delete existing (idempotent)
                kubectl delete configmap "$cm_name" -n "$NAMESPACE" --ignore-not-found=true > /dev/null

                # Create from file
                kubectl create configmap "$cm_name" -n "$NAMESPACE" \
                  --from-file="${filename}=${filepath}"

                # Label for Grafana sidecar auto-discovery
                kubectl label configmap "$cm_name" -n "$NAMESPACE" \
                  grafana_dashboard=1 --overwrite

                # Annotate with folder
                kubectl annotate configmap "$cm_name" -n "$NAMESPACE" \
                  grafana_folder="$folder" --overwrite

                echo "  ConfigMap applied: $cm_name (folder: $folder)"
              }

              # Dashboard list: (grafana.com ID, local filename, Grafana folder, ConfigMap name)
              # Format: "ID|filename|folder|cm_name"
              DASHBOARDS="
              1860|node-exporter-full.json|Infrastructure|helix-stax-node-exporter-full
              17346|traefik-official-standalone.json|Networking|helix-stax-traefik-dashboard
              20417|cloudnativepg.json|Database|helix-stax-cloudnativepg-dashboard
              9628|postgresql-database.json|Database|helix-stax-postgresql-dashboard
              14584|argocd.json|CI-CD|helix-stax-argocd-dashboard
              19974|argocd-app-overview.json|CI-CD|helix-stax-argocd-app-overview
              "

              ERRORS=0
              while IFS='|' read -r gnet_id filename folder cm_name; do
                # Skip blank lines from heredoc
                [ -z "$gnet_id" ] && continue

                gnet_id=$(echo "$gnet_id" | tr -d ' ')
                filename=$(echo "$filename" | tr -d ' ')
                folder=$(echo "$folder" | tr -d ' ')
                cm_name=$(echo "$cm_name" | tr -d ' ')

                filepath="${WORK_DIR}/${filename}"
                echo ""
                echo "[${gnet_id}] ${filename} -> folder: ${folder}"

                if fetch_dashboard "$gnet_id" "$filepath"; then
                  apply_dashboard_configmap "$filepath" "$cm_name" "$folder" || ERRORS=$((ERRORS + 1))
                else
                  ERRORS=$((ERRORS + 1))
                fi
              done <<< "$DASHBOARDS"

              echo ""
              echo "=== Verifying ConfigMaps ==="
              kubectl get configmap -n "$NAMESPACE" -l grafana_dashboard=1 \
                -o custom-columns='NAME:.metadata.name,FOLDER:.metadata.annotations.grafana_folder'

              if [ "$ERRORS" -gt 0 ]; then
                echo ""
                echo "WARNING: $ERRORS dashboard(s) failed. Check logs above."
                exit 1
              fi

              echo ""
              echo "=== Done ==="
              echo "Dashboards will appear in Grafana within ~30 seconds."
