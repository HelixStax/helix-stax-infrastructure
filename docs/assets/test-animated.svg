<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100">
  <style>
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.3 } }
    @keyframes flow { 0% { stroke-dashoffset:20 } 100% { stroke-dashoffset:0 } }
    .node { fill:#1a2332; stroke:#52A882; }
    .edge { stroke:#52A882; stroke-dasharray:5,5; animation: flow 1s linear infinite; }
    .dot { fill:#52A882; animation: pulse 2s ease-in-out infinite; }
  </style>
  <rect class="node" x="10" y="30" width="60" height="30" rx="5"/>
  <text x="40" y="50" text-anchor="middle" fill="white" font-size="8">Source</text>
  <line class="edge" x1="70" y1="45" x2="130" y2="45" stroke-width="2"/>
  <circle class="dot" cx="100" cy="45" r="3"/>
  <rect class="node" x="130" y="30" width="60" height="30" rx="5"/>
  <text x="160" y="50" text-anchor="middle" fill="white" font-size="8">Target</text>
</svg>
