  <line x1="220" y1="310" x2="268" y2="310" stroke="#C4975A" stroke-width="1.2" marker-end="url(#arrow-gold)"/>
  <line x1="470" y1="310" x2="518" y2="310" stroke="#C4975A" stroke-width="1.2" marker-end="url(#arrow-gold)"/>

