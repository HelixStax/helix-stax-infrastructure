  <text x="168" y="668" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">Ollama + Open WebUI</text>
  <text x="168" y="682" text-anchor="middle" fill="#8b949e" font-size="9">Local LLM Inference  ·  SearXNG</text>

  <!-- Harbor -->
  <rect x="594" y="652" width="110" height="40" rx="7" fill="#1a2332" stroke="#C4975A" stroke-width="1" filter="url(#shadow)"/>
  <text x="649" y="668" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">Harbor</text>
  <text x="649" y="682" text-anchor="middle" fill="#8b949e" font-size="9">Container Registry</text>

  <!-- Arrow: Layer 4 -> External -->
  <line x1="410" y1="706" x2="410" y2="724" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-dim)"/>

