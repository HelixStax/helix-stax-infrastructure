  <text x="113" y="607" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">n8n</text>
  <text x="113" y="620" text-anchor="middle" fill="#8b949e" font-size="9">Workflow</text>
  <text x="113" y="632" text-anchor="middle" fill="#8b949e" font-size="9">Automation</text>

  <!-- Rocket.Chat -->
  <rect x="182" y="588" width="110" height="52" rx="7" fill="#1a2332" stroke="#C4975A" stroke-width="1" filter="url(#shadow)"/>
  <text x="237" y="607" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">Rocket.Chat</text>
  <text x="237" y="620" text-anchor="middle" fill="#8b949e" font-size="9">Team Comms</text>
  <text x="237" y="632" text-anchor="middle" fill="#8b949e" font-size="9">Agent Alerts</text>

  <!-- Monitoring group -->
  <rect x="306" y="588" width="150" height="52" rx="7" fill="#1a2332" stroke="#C4975A" stroke-width="1" filter="url(#shadow)"/>
  <text x="381" y="607" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">Monitoring</text>
  <text x="381" y="620" text-anchor="middle" fill="#8b949e" font-size="9">Prometheus  ·  Grafana</text>
  <text x="381" y="632" text-anchor="middle" fill="#8b949e" font-size="9">Loki  ·  Alertmanager</text>

  <!-- Backstage -->
  <rect x="470" y="588" width="110" height="52" rx="7" fill="#1a2332" stroke="#C4975A" stroke-width="1" filter="url(#shadow)"/>
  <text x="525" y="607" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">Backstage</text>
  <text x="525" y="620" text-anchor="middle" fill="#8b949e" font-size="9">Developer</text>
  <text x="525" y="632" text-anchor="middle" fill="#8b949e" font-size="9">Portal</text>

