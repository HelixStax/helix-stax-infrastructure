  <text x="635" y="444" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">OpenBao + ESO</text>
  <text x="635" y="457" text-anchor="middle" fill="#8b949e" font-size="9">Secrets  ·  Dynamic</text>
  <text x="635" y="468" text-anchor="middle" fill="#8b949e" font-size="9">Creds  ·  Sync</text>

  <!-- CI/CD sub-group -->
  <rect x="700" y="425" width="65" height="48" rx="7" fill="#1a2332" stroke="#C4975A" stroke-width="1" filter="url(#shadow)"/>
  <text x="732" y="444" text-anchor="middle" fill="#C4975A" font-size="10" font-weight="600">Devtron</text>
  <text x="732" y="457" text-anchor="middle" fill="#8b949e" font-size="8">CI/CD</text>
  <text x="732" y="468" text-anchor="middle" fill="#8b949e" font-size="8">ArgoCD</text>

  <!-- Arrow: Layer 3 -> Layer 4 -->
  <line x1="410" y1="536" x2="410" y2="554" stroke="#52A882" stroke-width="1.5" marker-end="url(#arrow-teal)"/>

  <!-- ===== LAYER 4: APPLICATIONS ===== -->
