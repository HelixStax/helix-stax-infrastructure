  <text x="649" y="607" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">Outline</text>
  <text x="649" y="620" text-anchor="middle" fill="#8b949e" font-size="9">Knowledge</text>
  <text x="649" y="632" text-anchor="middle" fill="#8b949e" font-size="9">Base  ·  Docs</text>

