  <text x="255" y="444" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">CloudNativePG</text>
  <text x="255" y="457" text-anchor="middle" fill="#8b949e" font-size="9">PostgreSQL  ·  HA</text>
  <text x="255" y="468" text-anchor="middle" fill="#8b949e" font-size="9">pgvector</text>

  <!-- Valkey -->
  <rect x="330" y="425" width="110" height="48" rx="7" fill="#1a2332" stroke="#52A882" stroke-width="1" filter="url(#shadow)"/>
  <text x="385" y="444" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">Valkey</text>
  <text x="385" y="457" text-anchor="middle" fill="#8b949e" font-size="9">Cache  ·  Queue</text>
  <text x="385" y="468" text-anchor="middle" fill="#8b949e" font-size="9">Sessions</text>

  <!-- MinIO -->
  <rect x="455" y="425" width="110" height="48" rx="7" fill="#1a2332" stroke="#52A882" stroke-width="1" filter="url(#shadow)"/>
  <text x="510" y="444" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">MinIO</text>
  <text x="510" y="457" text-anchor="middle" fill="#8b949e" font-size="9">Object Storage</text>
  <text x="510" y="468" text-anchor="middle" fill="#8b949e" font-size="9">S3-compatible</text>

  <!-- OpenBao + ESO -->
