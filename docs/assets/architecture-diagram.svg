<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 900" width="820" height="900" style="background:#0D1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">

  <!-- Definitions: gradients, shadows, arrows -->
  <defs>
    <!-- Arrow markers -->
    <marker id="arrow-teal" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#52A882"/>
    </marker>
    <marker id="arrow-gold" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#C4975A"/>
    </marker>
    <marker id="arrow-dim" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a5568"/>
    </marker>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <!-- Subtle glow for layer headers -->
    <filter id="glow-teal">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- ===== TITLE ===== -->
  <text x="410" y="30" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700" letter-spacing="0.5">Helix Stax Infrastructure</text>
  <text x="410" y="50" text-anchor="middle" fill="#8b949e" font-size="11">K3s on Hetzner Cloud — Traffic Flow and Component Map</text>

  <!-- ===== INTERNET (top) ===== -->
  <rect x="310" y="66" width="200" height="34" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="410" y="87" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="600">Internet / End Users</text>

  <!-- Arrow: Internet -> Cloudflare -->
  <line x1="410" y1="100" x2="410" y2="118" stroke="#52A882" stroke-width="1.5" marker-end="url(#arrow-teal)"/>

  <!-- ===== LAYER 1: EDGE (Cloudflare) ===== -->
  <rect x="40" y="122" width="740" height="120" rx="10" fill="#0f1923" stroke="#52A882" stroke-width="1.5" opacity="0.9"/>
  <text x="58" y="143" fill="#52A882" font-size="10" font-weight="700" letter-spacing="1.5">LAYER 1  --  CLOUDFLARE EDGE</text>

  <!-- Cloudflare WAF/CDN/DNS node -->
  <rect x="60" y="152" width="200" height="52" rx="8" fill="#1a2332" stroke="#52A882" stroke-width="1" filter="url(#shadow)"/>
  <text x="160" y="171" text-anchor="middle" fill="#52A882" font-size="12" font-weight="700">Cloudflare</text>
  <text x="160" y="186" text-anchor="middle" fill="#8b949e" font-size="9.5">WAF  ·  DDoS Protection  ·  CDN</text>
  <text x="160" y="198" text-anchor="middle" fill="#8b949e" font-size="9.5">DNS  ·  TLS Termination</text>

  <!-- Cloudflare Zero Trust node -->
  <rect x="300" y="152" width="170" height="52" rx="8" fill="#1a2332" stroke="#52A882" stroke-width="1" filter="url(#shadow)"/>
  <text x="385" y="171" text-anchor="middle" fill="#52A882" font-size="12" font-weight="700">Zero Trust Access</text>
  <text x="385" y="186" text-anchor="middle" fill="#8b949e" font-size="9.5">WARP  ·  JWT Vault Auth</text>
  <text x="385" y="198" text-anchor="middle" fill="#8b949e" font-size="9.5">App Policies  ·  RBAC</text>

  <!-- Cloudflare Tunnel node -->
  <rect x="510" y="152" width="160" height="52" rx="8" fill="#1a2332" stroke="#52A882" stroke-width="1" filter="url(#shadow)"/>
  <text x="590" y="171" text-anchor="middle" fill="#52A882" font-size="12" font-weight="700">Cloudflare Tunnel</text>
  <text x="590" y="186" text-anchor="middle" fill="#8b949e" font-size="9.5">cloudflared  ·  No open</text>
  <text x="590" y="198" text-anchor="middle" fill="#8b949e" font-size="9.5">inbound ports</text>

  <!-- Arrow: Cloudflare -> Zero Trust -->
  <line x1="260" y1="178" x2="298" y2="178" stroke="#52A882" stroke-width="1.2" marker-end="url(#arrow-teal)"/>
  <!-- Arrow: Zero Trust -> Tunnel -->
  <line x1="470" y1="178" x2="508" y2="178" stroke="#52A882" stroke-width="1.2" marker-end="url(#arrow-teal)"/>

  <!-- Arrow: Cloudflare Tunnel -> K3s Traefik -->
  <line x1="590" y1="204" x2="590" y2="250" stroke="#52A882" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-teal)"/>
  <!-- Arrow: Cloudflare WAF -> Traefik (public traffic) -->
  <line x1="260" y1="204" x2="295" y2="250" stroke="#52A882" stroke-width="1.5" marker-end="url(#arrow-teal)"/>

  <!-- ===== LAYER 2: CLUSTER ===== -->
  <rect x="40" y="254" width="740" height="120" rx="10" fill="#0f1923" stroke="#C4975A" stroke-width="1.5" opacity="0.9"/>
  <text x="58" y="275" fill="#C4975A" font-size="10" font-weight="700" letter-spacing="1.5">LAYER 2  --  K3S CLUSTER  (Hetzner Cloud)</text>

  <!-- Traefik node -->
  <rect x="60" y="284" width="160" height="52" rx="8" fill="#1a2332" stroke="#C4975A" stroke-width="1" filter="url(#shadow)"/>
  <text x="140" y="303" text-anchor="middle" fill="#C4975A" font-size="12" font-weight="700">Traefik</text>
  <text x="140" y="318" text-anchor="middle" fill="#8b949e" font-size="9.5">Ingress Controller</text>
  <text x="140" y="330" text-anchor="middle" fill="#8b949e" font-size="9.5">IngressRoute CRDs</text>

  <!-- helix-stax-cp node -->
  <rect x="270" y="284" width="200" height="52" rx="8" fill="#1a2332" stroke="#C4975A" stroke-width="1" filter="url(#shadow)"/>
  <text x="370" y="303" text-anchor="middle" fill="#C4975A" font-size="12" font-weight="700">helix-stax-cp</text>
  <text x="370" y="318" text-anchor="middle" fill="#8b949e" font-size="9.5">Control Plane  ·  178.156.233.12</text>
  <text x="370" y="330" text-anchor="middle" fill="#8b949e" font-size="9.5">4 vCPU  ·  8 GB RAM  ·  Falkenstein</text>

  <!-- helix-stax-vps node -->
  <rect x="520" y="284" width="200" height="52" rx="8" fill="#1a2332" stroke="#C4975A" stroke-width="1" filter="url(#shadow)"/>
  <text x="620" y="303" text-anchor="middle" fill="#C4975A" font-size="12" font-weight="700">helix-stax-vps</text>
  <text x="620" y="318" text-anchor="middle" fill="#8b949e" font-size="9.5">Worker  ·  5.78.145.30</text>
  <text x="620" y="330" text-anchor="middle" fill="#8b949e" font-size="9.5">Role TBD  ·  Rebuild Pending</text>

