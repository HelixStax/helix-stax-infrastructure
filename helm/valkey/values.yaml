# Valkey values for Helix Stax
# Chart: bitnami/valkey
# Repo: https://charts.bitnami.com/bitnami
# Install: helm install valkey bitnami/valkey -n production -f values.yaml

architecture: standalone

auth:
  enabled: false

primary:
  nodeSelector:
    workload: platform
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 250m
      memory: 512Mi
  persistence:
    size: 1Gi
    storageClassName: local-path

metrics:
  enabled: false
