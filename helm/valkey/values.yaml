# Valkey values for Helix Stax
# Chart: bitnami/valkey
# Repo: https://charts.bitnami.com/bitnami
# Deploy via: Devtron Chart Store (GitOps/ArgoCD) or helm install
# Namespace: database (co-located with CNPG)
#
# Prerequisites:
#   kubectl create secret generic valkey-auth -n database --from-literal=valkey-password=<STRONG_PASSWORD>
#
# NOTE: Bitnami removed versioned tags from free Docker Hub. All images use 'latest'.
# Pin to specific SHA digests for production stability when ready.

# Image overrides — Bitnami free tier only has 'latest' tags
global:
  imageRegistry: docker.io

image:
  registry: docker.io
  repository: bitnami/valkey
  tag: latest

sentinel:
  image:
    registry: docker.io
    repository: bitnami/valkey-sentinel
    tag: latest

architecture: standalone  # Single instance — HA later when second DB node available

auth:
  enabled: true
  existingSecret: valkey-auth
  existingSecretPasswordKey: valkey-password

primary:
  nodeSelector:
    workload: platform                 # Runs on heart (CP node)
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    size: 2Gi
    storageClassName: local-path
  networkPolicy:
    enabled: true
    allowExternal: false               # Only same-namespace pods by default

# Prometheus metrics via redis-exporter sidecar
metrics:
  enabled: true
  image:
    registry: docker.io
    repository: bitnami/redis-exporter
    tag: latest
  serviceMonitor:
    enabled: true
    namespace: database
    additionalLabels:
      release: monitoring              # Required for kube-prometheus-stack discovery
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      memory: 64Mi

# Utility images
volumePermissions:
  image:
    registry: docker.io
    repository: bitnami/os-shell
    tag: latest

kubectl:
  image:
    registry: docker.io
    repository: bitnami/kubectl
    tag: latest

# Service configuration
service:
  type: ClusterIP
  ports:
    valkey: 6379
