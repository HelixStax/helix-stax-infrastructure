# kube-prometheus-stack values for Helix Stax
# Chart: prometheus-community/kube-prometheus-stack
# Install: helm install monitoring prometheus-community/kube-prometheus-stack -n monitoring -f values-prometheus-stack.yaml

alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi

grafana:
  adminPassword: helix-temp-password  # Fallback admin — do NOT remove until OIDC verified working
  persistence:
    enabled: false  # Config managed via Helm values
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

  # Plugins — installed at startup, survive pod restarts
  plugins:
    - yesoreyeram-infinity-datasource  # Query any HTTP/JSON/CSV/XML/GraphQL source

  # Loki datasource — provisioned so it survives pod restarts (persistence=false)
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      uid: loki
      isDefault: false
      version: 1

  # Dashboard sidecar — enables folder annotation so provisioned dashboards
  # land in organized Grafana folders instead of all in General.
  # The grafana_folder annotation on ConfigMaps controls placement.
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      folderAnnotation: grafana_folder
      provider:
        foldersFromFilesStructure: true

  # OIDC client credentials — sourced from grafana-zitadel-oauth secret (monitoring namespace)
  # Create secret before helm upgrade:
  #   sudo /usr/local/bin/k3s kubectl create secret generic grafana-zitadel-oauth \
  #     -n monitoring \
  #     --from-literal=client-id="<CLIENT_ID>" \
  #     --from-literal=client-secret="<CLIENT_SECRET>"
  envValueFrom:
    GF_AUTH_GENERIC_OAUTH_CLIENT_ID:
      secretKeyRef:
        name: grafana-zitadel-oauth
        key: client-id
    GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
      secretKeyRef:
        name: grafana-zitadel-oauth
        key: client-secret

  grafana.ini:
    server:
      root_url: https://grafana.helixstax.net
    auth.generic_oauth:
      enabled: true
      allow_sign_up: true  # Required: persistence=false wipes user DB on restart. Zitadel controls who can authenticate (self-registration disabled).
      name: Zitadel
      # client_id and client_secret injected via GF_ env vars above — do not set here
      scopes: openid email profile offline_access roles
      auth_url: https://zitadel.helixstax.net/oauth/v2/authorize
      token_url: https://zitadel.helixstax.net/oauth/v2/token
      api_url: https://zitadel.helixstax.net/oidc/v1/userinfo
      use_pkce: true
      use_refresh_token: true
      login_attribute_path: preferred_username
      email_attribute_path: email
      # Role mapping: groups claim is injected by Zitadel addGroupsClaim Action
      # Zitadel project roles: platform-admin -> GrafanaAdmin, platform-engineer -> Editor, others -> Viewer
      role_attribute_path: "contains(groups[*], 'platform-admin') && 'GrafanaAdmin' || contains(groups[*], 'platform-engineer') && 'Editor' || 'Viewer'"
      allow_assign_grafana_admin: true

prometheus:
  prometheusSpec:
    retention: 7d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          resources:
            requests:
              storage: 10Gi
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        memory: 1Gi

prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

# K3s doesn't expose these endpoints in the standard way
kubeControllerManager:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false
kubeScheduler:
  enabled: false
