# Shared security headers — included by all public-facing server blocks.
#
# These headers protect against common web attacks:
# - Clickjacking (X-Frame-Options)
# - MIME sniffing (X-Content-Type-Options)
# - XSS reflection (X-XSS-Protection, legacy but still useful)
# - Referrer leakage (Referrer-Policy)
# - Protocol downgrade (HSTS)

# Prevent clickjacking — no page should iframe our auth or vault
add_header X-Frame-Options "DENY" always;

# Prevent MIME type sniffing — browsers must respect Content-Type
add_header X-Content-Type-Options "nosniff" always;

# XSS protection — legacy header, still respected by some browsers
add_header X-XSS-Protection "1; mode=block" always;

# Control referrer information sent to other origins
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# HTTP Strict Transport Security — force HTTPS for 1 year + subdomains
# preload flag allows submission to browser preload lists
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Basic restrictive CSP — may need per-vhost tuning if apps break
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss: https:; font-src 'self' data:; frame-ancestors 'none';" always;

add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

# Hide Nginx version from response headers and error pages
server_tokens off;
