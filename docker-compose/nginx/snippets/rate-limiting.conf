# Rate limiting for authentication endpoints.
#
# Applied to OAuth/OIDC endpoints (Authentik's /application/o/ paths)
# to protect against brute-force attacks on token and authorization flows.
#
# NOTE: The limit_req_zone directive MUST be placed in the http {} context
# (i.e., in nginx.conf or a file loaded at that level), NOT inside a
# server {} or location {} block. Since we're using Nginx's default
# conf.d/ loading which is inside http {}, we need to handle this
# carefully.
#
# For the zone definition, create /etc/nginx/conf.d/00-rate-limit-zones.conf
# with the zone directive, or add it to nginx.conf. This snippet only
# contains the limit_req directive for use inside location {} blocks.
#
# Zone definition (must be in http context — add to nginx.conf or
# a separate conf.d file that loads before server blocks):
#
#   limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
#
# 10r/s = 10 requests per second per IP (steady state)
# burst=20 = allow up to 20 queued requests before rejecting
# nodelay = don't queue burst requests, serve immediately if under burst

limit_req zone=auth_limit burst=20 nodelay;
limit_req_status 429;
