# Catch-all server block — drops connections for unknown Host headers.
#
# Any request that doesn't match auth.helixstax.net or vault.helixstax.net
# gets silently dropped (444 = Nginx close connection without response).
# This prevents host-header attacks and information leakage from direct
# IP access or misconfigured DNS pointing at this server.
#
# The 443 default_server uses a self-signed snakeoil cert generated at
# container startup. This is intentional — we need a cert to complete
# the TLS handshake before we can inspect the Host header and reject it.
# No real traffic should ever see this cert.

# Generate self-signed cert for default server (run once on VPS):
#   mkdir -p /data/nginx/ssl
#   openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
#     -keyout /data/nginx/ssl/default.key \
#     -out /data/nginx/ssl/default.crt \
#     -subj "/CN=_"

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Drop connection silently — no response body, no headers
    return 444;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    # Self-signed snakeoil cert — only used to complete TLS handshake
    # before dropping the connection. Never seen by legitimate clients.
    ssl_certificate     /etc/nginx/ssl/default.crt;
    ssl_certificate_key /etc/nginx/ssl/default.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_reject_handshake off;

    return 444;
}
