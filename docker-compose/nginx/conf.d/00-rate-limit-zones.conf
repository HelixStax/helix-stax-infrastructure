# Rate limit zone definitions — loaded in http {} context before server blocks.
# The "00-" prefix ensures this file is loaded before any server block configs.
#
# auth_limit: 10 requests/second per client IP, with 10MB shared memory zone
# (10MB ≈ ~160,000 unique IP addresses tracked simultaneously)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
