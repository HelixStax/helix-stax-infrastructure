# Vaultwarden — public-facing password manager
# Proxies to vaultwarden container on helix-net Docker network.
# Vaultwarden uses WebSockets for live sync (/notifications/hub).
# Larger body size allowed (100m) since Vaultwarden stores file attachments.

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name vault.helixstax.net;

    # Allow ACME HTTP-01 challenge (fallback if DNS-01 is unavailable)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vault.helixstax.net;

    # --- TLS ---
    ssl_certificate     /etc/letsencrypt/live/vault.helixstax.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vault.helixstax.net/privkey.pem;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/vault.helixstax.net/fullchain.pem;
    resolver 1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout 5s;

    # --- Security headers ---
    include snippets/security-headers.conf;

    # Restrict admin panel to Netbird VPN users only
    location /admin {
        allow 100.64.0.0/10;  # Netbird CGNAT range
        allow 127.0.0.1;
        deny all;
        proxy_pass http://vaultwarden:80;
        include /etc/nginx/snippets/security-headers.conf;
    }

    # Rate limit authentication endpoint
    location /identity/connect/token {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://vaultwarden:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Main proxy ---
    location / {
        proxy_pass http://vaultwarden:80;

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Buffer settings
        proxy_buffer_size 64k;
        proxy_buffers 4 128k;
        proxy_busy_buffers_size 128k;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Vaultwarden stores file attachments — allow larger uploads
        client_max_body_size 100m;
    }

    # --- WebSocket support ---
    # Vaultwarden uses WebSockets for live sync notifications.
    # The /notifications/hub path handles real-time sync between clients.
    location /notifications/hub {
        proxy_pass http://vaultwarden:80;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # WebSocket upgrade headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # WebSocket connections are long-lived
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
