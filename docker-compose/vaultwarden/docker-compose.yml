services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      # Domain must match the actual URL — WebCrypto/FIDO2 origin matching depends on this
      DOMAIN: "https://vault.helixstax.net"
      SIGNUPS_ALLOWED: "false"
      ADMIN_TOKEN: "${VAULTWARDEN_ADMIN_TOKEN}"
      WEBSOCKET_ENABLED: "true"
    volumes:
      - /data/vaultwarden:/data
    networks:
      - helix-net
    ports:
      - "127.0.0.1:8088:80"
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  helix-net:
    external: true
