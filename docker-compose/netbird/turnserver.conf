# Coturn TURN/STUN server configuration
# Helix Stax — Netbird self-hosted
# Public IP: 5.78.145.30
#
# Ports:
#   3478/udp + 3478/tcp  — STUN/TURN listener
#   49152-65535/udp      — TURN relay range (UFW must allow this range)

listening-port=3478
tls-listening-port=5349

# Public IP mapping (server is not behind NAT, but set anyway for clarity)
external-ip=5.78.145.30

# Relay port range
min-port=49152
max-port=65535

# Realm
realm=netbird.helixstax.net

# Long-term credential mechanism
lt-cred-mech

# Static user for Netbird
# Password is set from .env — replaced at deploy time
user=netbird:SEE_ENV_NETBIRD_TURN_PASSWORD

# Logging
log-file=stdout
no-software-attribute
no-cli

fingerprint

# TLS certificates (will be set up when Traefik/Let's Encrypt is integrated)
# For now, no TLS on TURN — Netbird peers use STUN/TURN without TLS in dev
no-tls
no-dtls

pidfile="/var/tmp/turnserver.pid"
