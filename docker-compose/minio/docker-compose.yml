services:
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: helix-minio-admin
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - /data/minio:/data
    networks:
      - helix-net
    ports:
      # Bind to Netbird IP for zero-trust mesh access; falls back to localhost if NETBIRD_IP is unset
      # WARNING: NETBIRD_IP must be UNSET (not empty) for the fallback to work.
      # An empty NETBIRD_IP="" will bind to 0.0.0.0, exposing the service publicly.
      # Either export NETBIRD_IP=<ip> or leave it completely unset.
      - "${NETBIRD_IP:-127.0.0.1}:9002:9000"
      - "${NETBIRD_IP:-127.0.0.1}:9003:9001"
    command: server /data --console-address ":9001"
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  helix-net:
    external: true
