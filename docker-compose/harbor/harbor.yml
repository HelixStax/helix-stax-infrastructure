# Harbor Configuration — Helix Stax
# Version: v2.14.3
# Install path on VPS: /opt/harbor/harbor.yml
#
# CREDENTIALS: All secrets are stored in /opt/helix-stax/.env on the VPS
# and locally in ~/.claude/helix-stax-secrets/vps-credentials.env
# DO NOT commit real passwords here.

# Harbor installer config (not docker-compose) — does NOT support ${ENV_VAR} interpolation.
# Port rebinding must be done on the generated compose file after running install.sh,
# or by passing flags like --with-notary to the installer.
hostname: harbor.helixstax.net

# HTTP only — TLS terminated at Cloudflare/Traefik
http:
  port: 8080

# HTTPS disabled — external proxy handles TLS
# Uncomment and configure when Traefik is set up:
# https:
#   port: 443
#   certificate: /etc/traefik/certs/harbor.helixstax.com.crt
#   private_key: /etc/traefik/certs/harbor.helixstax.com.key

# Uncomment when Traefik is configured:
# external_url: https://harbor.helixstax.com

# Harbor admin password — see /opt/helix-stax/.env → HARBOR_ADMIN_PASSWORD
harbor_admin_password: CHANGE_ME

# Internal database section (unused — using external_database below)
database:
  password: CHANGE_ME
  max_idle_conns: 50
  max_open_conns: 100
  conn_max_lifetime: 5m
  conn_max_idle_time: 0

# Registry image storage
data_volume: /data/harbor

# External PostgreSQL — shared helix-postgres on helix-net
# Databases: harbor, harbor_notary_server, harbor_notary_signer
external_database:
  harbor:
    host: helix-postgres
    port: 5432
    db_name: harbor
    username: postgres
    password: CHANGE_ME  # POSTGRES_PASSWORD from /opt/helix-stax/.env
    ssl_mode: disable
    max_idle_conns: 2
    max_open_conns: 50

# External Redis — shared helix-redis on helix-net
external_redis:
  host: helix-redis:6379
  password: CHANGE_ME  # REDIS_PASSWORD from /opt/helix-stax/.env
  registry_db_index: 1
  jobservice_db_index: 2
  trivy_db_index: 5
  idle_timeout_seconds: 30

# Trivy DISABLED — scanning handled by Devtron CI pipeline
# Enable later with:
# trivy:
#   skip_update: false
#   security_check: vuln

jobservice:
  max_job_workers: 5
  max_job_duration_hours: 24
  job_loggers:
    - STD_OUTPUT
    - FILE
  logger_sweeper_duration: 1

notification:
  webhook_job_max_retry: 3
  webhook_job_http_client_timeout: 3

log:
  level: info
  local:
    rotate_count: 20
    rotate_size: 100M
    location: /var/log/harbor

_version: 2.14.0

proxy:
  http_proxy:
  https_proxy:
  no_proxy:
  components:
    - core
    - jobservice

upload_purging:
  enabled: true
  age: 168h
  interval: 24h
  dryrun: false

cache:
  enabled: true
  expire_hours: 24
